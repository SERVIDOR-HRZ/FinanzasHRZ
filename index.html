<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
  <title>FinanceApp</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="elementos/css/style.css" />
</head>
<body>

  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <main class="main-content">
    <div class="page-header glass">
      <h1 class="app-title">FinanceApp</h1>
      <p class="app-subtitle">Tu control financiero</p>
    </div>
  </main>

  <!-- Nav inferior -->
  <div class="nav-wrapper">
    <nav class="bottom-nav glass">
      <a href="index.html" class="nav-item active" data-page="cuentas">
        <i class="fa-solid fa-wallet nav-icon"></i>
        <span class="nav-label">Cuentas</span>
      </a>
      <a href="#" class="nav-item" data-page="ingresos">
        <i class="fa-solid fa-arrow-trend-up nav-icon"></i>
        <span class="nav-label">Ingresos</span>
      </a>

      <div class="nav-spacer"></div>

      <a href="#" class="nav-item" data-page="gastos">
        <i class="fa-solid fa-arrow-trend-down nav-icon"></i>
        <span class="nav-label">Gastos</span>
      </a>
      <a href="secciones/divisas.html" class="nav-item" data-page="divisas">
        <i class="fa-solid fa-coins nav-icon"></i>
        <span class="nav-label">Divisas</span>
      </a>
    </nav>

    <button class="fab" id="fabBtn" aria-label="Nuevo">
      <i class="fa-solid fa-plus"></i>
    </button>
  </div>

  <!-- Modal: Ingreso o Gasto -->
  <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
    <div class="modal-sheet glass" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-handle"></div>
      <p class="modal-eyebrow">Nueva transacción</p>
      <h2 class="modal-title" id="modalTitle">¿Qué deseas registrar?</h2>
      <p class="modal-subtitle">Selecciona el tipo de movimiento</p>
      <div class="modal-options">
        <button class="modal-option option-ingreso" id="optIngreso">
          <span class="option-icon-wrap"><i class="fa-solid fa-arrow-trend-up"></i></span>
          <span class="option-text">
            <span class="option-label">Ingreso</span>
            <span class="option-desc">Dinero que entra</span>
          </span>
          <i class="fa-solid fa-chevron-right option-arrow"></i>
        </button>
        <button class="modal-option option-gasto" id="optGasto">
          <span class="option-icon-wrap"><i class="fa-solid fa-arrow-trend-down"></i></span>
          <span class="option-text">
            <span class="option-label">Gasto</span>
            <span class="option-desc">Dinero que sale</span>
          </span>
          <i class="fa-solid fa-chevron-right option-arrow"></i>
        </button>
      </div>
      <button class="modal-cancel" id="modalCancel">Cancelar</button>
    </div>
  </div>

  <script src="elementos/js/app.js"></script>
</body>
</html>
